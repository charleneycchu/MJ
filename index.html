<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>麻將抽牌</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --gold: #f0c84a;
      --gold-dim: rgba(240,200,74,0.6);
      --tile-bg: linear-gradient(160deg, #fffef8 0%, #f4eed8 100%);
      --tile-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 6px 16px rgba(0,0,0,0.35),
                     inset 0 1px 0 rgba(255,255,255,0.9);
    }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(30,80,48,0.9) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 85%, rgba(22,58,34,0.9) 0%, transparent 55%),
        linear-gradient(160deg, #122019 0%, #0a1a10 50%, #0e2216 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding-top: max(48px, env(safe-area-inset-top, 48px));
      padding-bottom: max(36px, env(safe-area-inset-bottom, 36px));
      padding-left: 20px;
      padding-right: 20px;
      gap: 0;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: 28px; font-weight: 800;
      letter-spacing: 0.25em; color: var(--gold);
      text-shadow: 0 2px 12px rgba(240,200,74,0.4);
    }
    .header p {
      margin-top: 3px; font-size: 11px;
      letter-spacing: 0.2em; color: var(--gold-dim);
    }

    .tile-stage {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      perspective: 900px;
    }

    .tile-card {
      width: 180px; height: 235px;
      transform-style: preserve-3d;
    }

    .tile-card.animating {
      animation: flipDraw 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes flipDraw {
      0%   { transform: rotateY(0deg) scale(1); }
      40%  { transform: rotateY(90deg) scale(1.04); }
      60%  { transform: rotateY(90deg) scale(1.04); }
      100% { transform: rotateY(0deg) scale(1); }
    }

    .tile-face {
      width: 100%; height: 100%;
      background: var(--tile-bg);
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,0.88);
      box-shadow: var(--tile-shadow);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; position: relative; overflow: hidden;
    }

    .tile-face::before {
      content: ''; position: absolute; inset: 8px;
      border: 1.5px solid rgba(0,0,0,0.09);
      border-radius: 13px; pointer-events: none;
    }

    .tile-face .corner {
      position: absolute; font-size: 11px;
      color: rgba(0,0,0,0.18); line-height: 1;
    }
    .tile-face .corner.tl { top: 14px; left: 14px; }
    .tile-face .corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

    .tile-emoji {
      font-size: 88px; line-height: 1;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
      user-select: none;
    }

    .tile-label {
      font-size: 19px; font-weight: 700;
      color: #251508; letter-spacing: 0.08em;
    }

    .tile-type-badge {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; color: #fff;
      background: var(--type-color, #888);
      padding: 2px 10px; border-radius: 10px;
    }

    .type-花牌 { --type-color: #c0392b; }
    .type-萬子 { --type-color: #c0392b; }
    .type-索子 { --type-color: #27ae60; }
    .type-筒子 { --type-color: #2980b9; }
    .type-字牌 { --type-color: #7d3c98; }

    .tile-face.initial .tile-emoji   { opacity: 0.3; font-size: 66px; }
    .tile-face.initial .tile-label   { color: #bba; font-size: 15px; }
    .tile-face.initial .tile-type-badge { display: none; }
    .tile-face.initial .corner       { display: none; }

    .counter-bar {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(240,200,74,0.2);
      border-radius: 16px; padding: 10px 0;
      width: 100%; max-width: 320px;
    }

    .counter-cell { flex: 1; text-align: center; }
    .counter-cell + .counter-cell {
      border-left: 1px solid rgba(240,200,74,0.2);
    }

    .counter-num {
      display: block; font-size: 26px; font-weight: 800;
      color: var(--gold); line-height: 1;
    }

    .counter-lbl {
      display: block; font-size: 10px;
      letter-spacing: 0.15em; color: var(--gold-dim); margin-top: 2px;
    }

    .mode-badge {
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.05em;
    }

    .mode-group {
      display: flex; gap: 8px;
      width: 100%; max-width: 320px;
    }

    .mode-btn {
      flex: 1; height: 40px;
      border: 1.5px solid rgba(240,200,74,0.3);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: rgba(240,200,74,0.6);
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none; -webkit-user-select: none;
      font-family: -apple-system, 'PingFang TC', sans-serif;
    }

    .mode-btn.active {
      background: rgba(240,200,74,0.18);
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 12px rgba(240,200,74,0.2);
    }

    .mode-btn:active { opacity: 0.75; }

    .button-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px; width: 100%;
    }

    .draw-btn {
      width: 100%; max-width: 260px; height: 56px;
      border: none; border-radius: 28px;
      background: linear-gradient(145deg, #f0c84a 0%, #c8900a 100%);
      color: #1a0800; font-size: 20px; font-weight: 800;
      letter-spacing: 0.3em; cursor: pointer;
      box-shadow: 0 8px 24px rgba(240,160,32,0.38), 0 2px 6px rgba(0,0,0,0.3),
                  inset 0 1px 0 rgba(255,255,255,0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      user-select: none; -webkit-user-select: none;
      font-family: -apple-system, 'PingFang TC', sans-serif;
    }

    .draw-btn:active {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 10px rgba(240,160,32,0.25);
    }

    .reset-btn {
      background: none;
      border: 1.5px solid rgba(240,200,74,0.35);
      color: rgba(240,200,74,0.7);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; padding: 8px 22px;
      border-radius: 18px; cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      user-select: none; -webkit-user-select: none;
      font-family: -apple-system, 'PingFang TC', sans-serif;
    }

    .reset-btn:active {
      background: rgba(240,200,74,0.1); color: var(--gold);
    }

    .history-wrap {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.14);
      border: 1.5px solid rgba(240,200,74,0.45);
      border-radius: 16px;
      padding: 10px 14px 10px;
    }

    .history-label {
      font-size: 11px; letter-spacing: 0.15em;
      color: var(--gold); margin-bottom: 8px; text-align: center;
      font-weight: 600;
    }

    .history-scroll {
      display: flex; gap: 6px;
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 2px 2px 2px;
      scrollbar-width: none;
      min-height: 40px; align-items: center;
    }
    .history-scroll::-webkit-scrollbar { display: none; }

    .history-tile {
      font-size: 30px; flex-shrink: 0;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
      user-select: none;
    }

    .history-empty {
      font-size: 12px; color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em; text-align: center;
      padding: 4px 0; width: 100%;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1>麻將抽牌</h1>
    <p>有放回抽取 · 無限次數</p>
  </header>

  <div class="tile-stage">
    <div class="tile-card" id="tileCard">
      <div class="tile-face initial" id="tileFace">
        <span class="corner tl" id="cornerTL"></span>
        <div class="tile-emoji" id="tileEmoji">🀫</div>
        <div class="tile-label" id="tileLabel">點擊抽牌</div>
        <div class="tile-type-badge" id="tileBadge"></div>
        <span class="corner br" id="cornerBR"></span>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%">
    <div class="counter-bar">
      <div class="counter-cell">
        <span class="counter-num" id="totalNum">0</span>
        <span class="counter-lbl">已抽次數</span>
      </div>
      <div class="counter-cell">
        <span class="counter-num" id="flowerNum">0</span>
        <span class="counter-lbl">抽到花牌</span>
      </div>
      <div class="counter-cell">
        <span class="mode-badge" id="modeBadge" style="color:var(--gold)">正常</span>
        <span class="counter-lbl">當前模式</span>
      </div>
    </div>
  </div>

  <div class="mode-group">
    <button class="mode-btn active" id="modeNormal"   onclick="setMode('normal')">🀄 正常抽牌</button>
    <button class="mode-btn"        id="modeNoFlower" onclick="setMode('noflower')">🚫 抽不到花</button>
    <button class="mode-btn"        id="modeDouble"   onclick="setMode('double')">🌸 花機率×2</button>
  </div>

  <div class="button-group">
    <button class="draw-btn" id="drawBtn" onclick="drawTile()">抽　牌</button>
    <button class="reset-btn" onclick="resetStats()">🔄 重新洗牌</button>
  </div>

  <div class="history-wrap">
    <div class="history-label">抽牌記錄（最新在前）</div>
    <div class="history-scroll" id="historyScroll">
      <div class="history-empty" id="historyEmpty">尚未抽取任何牌</div>
    </div>
  </div>

<script>
  const ALL = [];

  [['🀢','梅'],['🀣','蘭'],['🀤','菊'],['🀥','竹'],
   ['🀦','春'],['🀧','夏'],['🀨','秋'],['🀩','冬']]
    .forEach(([e,n]) => ALL.push({ emoji:e, name:n, type:'花牌' }));

  ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏']
    .forEach((e,i) => { for(let k=0;k<4;k++) ALL.push({ emoji:e, name:'一二三四五六七八九'[i]+'萬', type:'萬子' }); });

  ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘']
    .forEach((e,i) => { for(let k=0;k<4;k++) ALL.push({ emoji:e, name:'一二三四五六七八九'[i]+'索', type:'索子' }); });

  ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡']
    .forEach((e,i) => { for(let k=0;k<4;k++) ALL.push({ emoji:e, name:'一二三四五六七八九'[i]+'筒', type:'筒子' }); });

  [['🀀','東風'],['🀁','南風'],['🀂','西風'],['🀃','北風'],
   ['🀄','中'],['🀅','發'],['🀆','白板']]
    .forEach(([e,n]) => { for(let k=0;k<4;k++) ALL.push({ emoji:e, name:n, type:'字牌' }); });

  const POOL_NORMAL   = ALL;
  const POOL_NOFLOWER = ALL.filter(t => t.type !== '花牌');
  const POOL_DOUBLE   = ALL.concat(ALL.filter(t => t.type === '花牌'));

  let mode        = 'normal';
  let totalDraws  = 0;
  let flowerDraws = 0;
  let isAnimating = false;

  const MODES = {
    normal:   { pool: POOL_NORMAL,   label: '正常' },
    noflower: { pool: POOL_NOFLOWER, label: '無花' },
    double:   { pool: POOL_DOUBLE,   label: '花×2' }
  };

  function setMode(m) {
    mode = m;
    document.getElementById('modeNormal').classList.toggle('active',   m === 'normal');
    document.getElementById('modeNoFlower').classList.toggle('active', m === 'noflower');
    document.getElementById('modeDouble').classList.toggle('active',   m === 'double');
    document.getElementById('modeBadge').textContent = MODES[m].label;
  }

  function drawTile() {
    if (isAnimating) return;
    isAnimating = true;

    const pool = MODES[mode].pool;
    const tile = pool[Math.floor(Math.random() * pool.length)];

    totalDraws++;
    if (tile.type === '花牌') flowerDraws++;

    const card = document.getElementById('tileCard');
    card.classList.remove('animating');
    void card.offsetWidth;
    card.classList.add('animating');

    setTimeout(() => setTileDisplay(tile), 220);

    setTimeout(() => {
      card.classList.remove('animating');
      isAnimating = false;
      updateCounter();
      updateHistory(tile);
    }, 560);
  }

  function setTileDisplay(tile) {
    const face  = document.getElementById('tileFace');
    const emoji = document.getElementById('tileEmoji');
    const label = document.getElementById('tileLabel');
    const badge = document.getElementById('tileBadge');
    const ctl   = document.getElementById('cornerTL');
    const cbr   = document.getElementById('cornerBR');

    face.className    = 'tile-face type-' + tile.type;
    emoji.textContent = tile.emoji;
    label.textContent = tile.name;
    badge.textContent = tile.type;
    ctl.textContent   = tile.emoji;
    cbr.textContent   = tile.emoji;
  }

  function updateCounter() {
    document.getElementById('totalNum').textContent  = totalDraws;
    document.getElementById('flowerNum').textContent = flowerDraws;
  }

  function updateHistory(tile) {
    const scroll = document.getElementById('historyScroll');
    document.getElementById('historyEmpty').style.display = 'none';
    const span = document.createElement('span');
    span.className    = 'history-tile';
    span.textContent  = tile.emoji;
    span.title        = tile.name;
    scroll.insertBefore(span, scroll.firstChild);
  }

  function resetStats() {
    if (isAnimating) return;
    totalDraws  = 0;
    flowerDraws = 0;
    updateCounter();

    const face = document.getElementById('tileFace');
    face.className = 'tile-face initial';
    document.getElementById('tileEmoji').textContent = '🀫';
    document.getElementById('tileLabel').textContent = '點擊抽牌';
    document.getElementById('tileBadge').textContent = '';
    document.getElementById('cornerTL').textContent  = '';
    document.getElementById('cornerBR').textContent  = '';

    const scroll = document.getElementById('historyScroll');
    scroll.querySelectorAll('.history-tile').forEach(el => el.remove());
    document.getElementById('historyEmpty').style.display = 'block';
  }
</script>
</body>
</html>
