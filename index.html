<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>麻將抽牌</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    :root {
      --gold: #f0c84a;
      --gold-dim: rgba(240,200,74,0.55);
      --felt-dark: #0e2818;
      --felt-mid: #163a22;
      --felt-light: #1e5030;
      --tile-bg: linear-gradient(160deg, #fffef8 0%, #f4eed8 100%);
      --tile-shadow: 0 24px 64px rgba(0,0,0,0.55), 0 6px 16px rgba(0,0,0,0.35),
                     inset 0 1px 0 rgba(255,255,255,0.9);
    }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, 'PingFang TC', 'Helvetica Neue', sans-serif;
      background:
        radial-gradient(ellipse at 25% 15%, rgba(30,80,48,0.9) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 85%, rgba(22,58,34,0.9) 0%, transparent 55%),
        linear-gradient(160deg, #122019 0%, #0a1a10 50%, #0e2216 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 52px 24px 40px;
      padding-top: max(52px, env(safe-area-inset-top, 52px));
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      gap: 0;
    }

    .header { text-align: center; }
    .header h1 {
      font-size: 30px; font-weight: 800;
      letter-spacing: 0.25em; color: var(--gold);
      text-shadow: 0 2px 12px rgba(240,200,74,0.4);
    }
    .header p {
      margin-top: 4px; font-size: 12px;
      letter-spacing: 0.2em; color: var(--gold-dim);
    }

    .tile-stage {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      perspective: 900px;
    }

    .tile-card {
      width: 200px; height: 260px;
      transform-style: preserve-3d; position: relative;
    }

    .tile-card.animating {
      animation: flipDraw 0.55s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    @keyframes flipDraw {
      0%   { transform: rotateY(0deg) scale(1); }
      40%  { transform: rotateY(90deg) scale(1.04); }
      60%  { transform: rotateY(90deg) scale(1.04); }
      100% { transform: rotateY(0deg) scale(1); }
    }

    .tile-face {
      width: 100%; height: 100%;
      background: var(--tile-bg);
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,0.88);
      box-shadow: var(--tile-shadow);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; position: relative; overflow: hidden;
    }

    .tile-face::before {
      content: ''; position: absolute; inset: 8px;
      border: 1.5px solid rgba(0,0,0,0.09);
      border-radius: 13px; pointer-events: none;
    }

    .tile-face .corner {
      position: absolute; font-size: 11px;
      color: rgba(0,0,0,0.18); line-height: 1;
    }
    .tile-face .corner.tl { top: 14px; left: 14px; }
    .tile-face .corner.br { bottom: 14px; right: 14px; transform: rotate(180deg); }

    .tile-emoji {
      font-size: 96px; line-height: 1;
      transition: opacity 0.15s ease;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
      user-select: none;
    }

    .tile-label {
      font-size: 20px; font-weight: 700;
      color: #251508; letter-spacing: 0.08em;
    }

    .tile-type-badge {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; color: #fff;
      background: var(--type-color, #888);
      padding: 2px 10px; border-radius: 10px;
    }

    .counter-bar {
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(240,200,74,0.18);
      border-radius: 16px; padding: 12px 0;
      width: 100%; max-width: 320px;
    }

    .counter-cell { flex: 1; text-align: center; }
    .counter-cell + .counter-cell { border-left: 1px solid rgba(240,200,74,0.18); }

    .counter-num {
      display: block; font-size: 28px; font-weight: 800;
      color: var(--gold); line-height: 1;
    }

    .counter-lbl {
      display: block; font-size: 10px;
      letter-spacing: 0.15em; color: var(--gold-dim); margin-top: 2px;
    }

    .progress-wrap {
      width: 100%; max-width: 320px; height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0c84a, #e8a020);
      border-radius: 2px; width: 0%;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .button-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px; width: 100%;
    }

    .draw-btn {
      width: 100%; max-width: 260px; height: 58px;
      border: none; border-radius: 29px;
      background: linear-gradient(145deg, #f0c84a 0%, #c8900a 100%);
      color: #1a0800; font-size: 20px; font-weight: 800;
      letter-spacing: 0.3em; cursor: pointer;
      box-shadow: 0 8px 24px rgba(240,160,32,0.38), 0 2px 6px rgba(0,0,0,0.3),
                  inset 0 1px 0 rgba(255,255,255,0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.2s ease;
      user-select: none; -webkit-user-select: none;
    }

    .draw-btn:active:not(:disabled) {
      transform: scale(0.95) translateY(2px);
      box-shadow: 0 2px 10px rgba(240,160,32,0.25);
    }

    .draw-btn:disabled {
      background: linear-gradient(145deg, #555 0%, #333 100%);
      color: #777; box-shadow: none; cursor: default;
    }

    .reset-btn {
      background: none;
      border: 1.5px solid rgba(240,200,74,0.3);
      color: rgba(240,200,74,0.65);
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; padding: 9px 22px;
      border-radius: 18px; cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
      user-select: none; -webkit-user-select: none;
    }

    .reset-btn:active {
      background: rgba(240,200,74,0.08); color: var(--gold);
    }

    .history-wrap {
      width: 100%; max-width: 340px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(240,200,74,0.25);
      border-radius: 16px; padding: 10px 14px 12px;
    }

    .history-label {
      font-size: 11px; letter-spacing: 0.15em;
      color: var(--gold); margin-bottom: 8px; text-align: center;
    }

    .history-scroll {
      display: flex; gap: 8px;
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 4px 2px 4px; scrollbar-width: none;
      min-height: 42px; align-items: center;
    }
    .history-scroll::-webkit-scrollbar { display: none; }

    .history-tile {
      font-size: 32px; flex-shrink: 0;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
      user-select: none; cursor: default;
    }

    .history-empty {
      font-size: 12px; color: rgba(240,200,74,0.55);
      letter-spacing: 0.12em; text-align: center;
      padding: 4px 0; width: 100%;
    }

    .type-花牌 { --type-color: #c0392b; }
    .type-萬子 { --type-color: #c0392b; }
    .type-索子 { --type-color: #27ae60; }
    .type-筒子 { --type-color: #2980b9; }
    .type-字牌 { --type-color: #7d3c98; }

    .tile-face.initial .tile-emoji   { opacity: 0.35; font-size: 72px; }
    .tile-face.initial .tile-label   { color: #bba; font-size: 16px; }
    .tile-face.initial .tile-type-badge { display: none; }
    .tile-face.initial .corner       { display: none; }

    .tile-face.empty .tile-emoji   { font-size: 54px; opacity: 0.3; }
    .tile-face.empty .tile-label   { color: #aaa; font-size: 15px; }
    .tile-face.empty .tile-type-badge { display: none; }
    .tile-face.empty .corner       { display: none; }
  </style>
</head>
<body>

  <header class="header">
    <h1>麻將抽牌</h1>
    <p>共 144 張牌 · 無放回抽取</p>
  </header>

  <div class="tile-stage">
    <div class="tile-card" id="tileCard">
      <div class="tile-face initial" id="tileFace">
        <span class="corner tl" id="cornerTL"></span>
        <div class="tile-emoji" id="tileEmoji">🀫</div>
        <div class="tile-label" id="tileLabel">點擊抽牌</div>
        <div class="tile-type-badge" id="tileBadge"></div>
        <span class="corner br" id="cornerBR"></span>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;width:100%">
    <div class="counter-bar">
      <div class="counter-cell">
        <span class="counter-num" id="drawnNum">0</span>
        <span class="counter-lbl">已抽</span>
      </div>
      <div class="counter-cell">
        <span class="counter-num" id="remainNum">144</span>
        <span class="counter-lbl">剩餘</span>
      </div>
      <div class="counter-cell">
        <span class="counter-num">144</span>
        <span class="counter-lbl">總計</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="button-group">
    <button class="draw-btn" id="drawBtn" onclick="drawTile()">抽　牌</button>
    <button class="reset-btn" onclick="resetDeck()">🔄 重新洗牌</button>
  </div>

  <div class="history-wrap">
    <div class="history-label">抽牌記錄（最新在前）</div>
    <div class="history-scroll" id="historyScroll">
      <div class="history-empty" id="historyEmpty">尚未抽取任何牌</div>
    </div>
  </div>

<script>
  const TILES = [];

  [
    ['🀢','梅'],['🀣','蘭'],['🀤','菊'],['🀥','竹'],
    ['🀦','春'],['🀧','夏'],['🀨','秋'],['🀩','冬']
  ].forEach(([e,n]) => TILES.push({ emoji:e, name:n, type:'花牌' }));

  ['🀇','🀈','🀉','🀊','🀋','🀌','🀍','🀎','🀏']
    .forEach((e,i) => { for(let k=0;k<4;k++) TILES.push({ emoji:e, name:`${'一二三四五六七八九'[i]}萬`, type:'萬子' }); });

  ['🀐','🀑','🀒','🀓','🀔','🀕','🀖','🀗','🀘']
    .forEach((e,i) => { for(let k=0;k<4;k++) TILES.push({ emoji:e, name:`${'一二三四五六七八九'[i]}索`, type:'索子' }); });

  ['🀙','🀚','🀛','🀜','🀝','🀞','🀟','🀠','🀡']
    .forEach((e,i) => { for(let k=0;k<4;k++) TILES.push({ emoji:e, name:`${'一二三四五六七八九'[i]}筒`, type:'筒子' }); });

  [['🀀','東風'],['🀁','南風'],['🀂','西風'],['🀃','北風'],
   ['🀄','中'],['🀅','發'],['🀆','白板']]
    .forEach(([e,n]) => { for(let k=0;k<4;k++) TILES.push({ emoji:e, name:n, type:'字牌' }); });

  let deck = [], drawn = [], isAnimating = false;

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function initDeck() { deck = shuffle(TILES); drawn = []; }

  function updateCounter() {
    document.getElementById('drawnNum').textContent  = drawn.length;
    document.getElementById('remainNum').textContent = deck.length;
    document.getElementById('progressFill').style.width = (drawn.length / 144 * 100) + '%';
  }

  function updateHistory() {
    const scroll = document.getElementById('historyScroll');
    const empty  = document.getElementById('historyEmpty');
    if (drawn.length === 0) {
      empty.style.display = 'block';
      scroll.querySelectorAll('.history-tile').forEach(el => el.remove());
      return;
    }
    empty.style.display = 'none';
    const span = document.createElement('span');
    span.className = 'history-tile';
    span.textContent = drawn[drawn.length-1].emoji;
    span.title = drawn[drawn.length-1].name;
    scroll.insertBefore(span, scroll.firstChild);
  }

  function setTileDisplay(tile, stateClass) {
    const face  = document.getElementById('tileFace');
    const emoji = document.getElementById('tileEmoji');
    const label = document.getElementById('tileLabel');
    const badge = document.getElementById('tileBadge');
    const ctl   = document.getElementById('cornerTL');
    const cbr   = document.getElementById('cornerBR');
    face.className = 'tile-face ' + stateClass + (tile ? ' type-'+tile.type : '');
    if (tile) {
      emoji.textContent = tile.emoji; label.textContent = tile.name;
      badge.textContent = tile.type; ctl.textContent = tile.emoji; cbr.textContent = tile.emoji;
    } else if (stateClass === 'empty') {
      emoji.textContent = '🀫'; label.textContent = '牌已全部抽完'; badge.textContent = '';
    } else {
      emoji.textContent = '🀫'; label.textContent = '點擊抽牌'; badge.textContent = '';
    }
  }

  function drawTile() {
    if (deck.length === 0 || isAnimating) return;
    isAnimating = true;
    const tile = deck.pop();
    drawn.push(tile);
    const card = document.getElementById('tileCard');
    card.classList.remove('animating');
    void card.offsetWidth;
    card.classList.add('animating');
    setTimeout(() => setTileDisplay(tile, ''), 220);
    setTimeout(() => {
      card.classList.remove('animating');
      isAnimating = false;
      updateCounter();
      updateHistory();
      if (deck.length === 0) {
        const btn = document.getElementById('drawBtn');
        btn.disabled = true; btn.textContent = '牌已抽完';
        setTileDisplay(null, 'empty');
      }
    }, 560);
  }

  function resetDeck() {
    if (isAnimating) return;
    initDeck();
    setTileDisplay(null, 'initial');
    updateCounter();
    const scroll = document.getElementById('historyScroll');
    scroll.querySelectorAll('.history-tile').forEach(el => el.remove());
    document.getElementById('historyEmpty').style.display = 'block';
    const btn = document.getElementById('drawBtn');
    btn.disabled = false; btn.textContent = '抽　牌';
  }

  initDeck();
</script>
</body>
</html>
